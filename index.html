<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POO con Canvas</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg glass-navbar">
    <div class="container-fluid">
      <span class="navbar-brand text-white fw-bold">Canvas App</span>
    </div>
  </nav>

  <div class="container py-4">

    <!-- CONTROLES -->
    <div class="glass-card p-4 mb-4">
      <h4 class="mb-3">Controles</h4>

      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Cantidad de círculos</label>
          <input type="number" id="cantidad" class="form-control" min="1" max="100" value="5">
        </div>

        <div class="col-md-3">
          <label class="form-label">Ancho del canvas</label>
          <input type="number" id="anchoCanvas" class="form-control" value="600">
        </div>

        <div class="col-md-3">
          <label class="form-label">Alto del canvas</label>
          <input type="number" id="altoCanvas" class="form-control" value="400">
        </div>

        <div class="col-md-3 d-grid">
          <button class="btn btn-light" onclick="aplicarCambios()">Aplicar</button>
        </div>
      </div>
    </div>

    <!-- CANVAS -->
    <div class="glass-card p-3 text-center">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="glass-footer text-center py-3 mt-4">
    <span>Desarrollado por <strong>Jesus Roberto Hernandez Benitez</strong></span>
  </footer>

  <script src="./assets/js/main.js"></script>
</body>
</html>
