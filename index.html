<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POO con Canvas</title>
  <link rel="icon" type="image/png" href="./assets/img/pelotas.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<!-- 🔥 BODY BIEN ABIERTO Y CERRADO -->
<body style="background: url('./assets/img/imag.jpg') no-repeat center center/cover; min-height: 100vh; color: white;">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg glass-navbar">
    <div class="container-fluid">
      <span class="navbar-brand text-white fw-bold">Canvas App</span>
    </div>
  </nav>

  <div class="container py-4">

    <!-- CONTROLES -->
    <div class="glass-card p-4 mb-4">
      <h4 class="mb-3">Controles</h4>

      <div class="row g-3 align-items-end">

        <!-- EFECTO -->
        <div class="col-md-3">
          <label class="form-label">Efecto</label>
          <select id="efecto" class="form-control">
  <option value="explosion">💥 Explosión</option>
  <option value="lluvia">🌧️ Lluvia</option>
  <option value="asteroides">🪐 Asteroides (flotan)</option>
  <option value="superrebote">🏀 Súper rebote EXTREMO</option>
</select>
        </div>

        <!-- CANTIDAD -->
        <div class="col-md-3">
          <label class="form-label">Cantidad de círculos</label>
          <input type="number" id="cantidad" class="form-control" min="1" max="100" value="5">
        </div>

        <!-- ANCHO -->
        <div class="col-md-3">
          <label class="form-label">Ancho del canvas</label>
          <input type="number" id="anchoCanvas" class="form-control" value="600">
        </div>

        <!-- ALTO -->
        <div class="col-md-3">
          <label class="form-label">Alto del canvas</label>
          <input type="number" id="altoCanvas" class="form-control" value="400">
        </div>

        <!-- BOTÓN -->
        <div class="col-md-3 d-grid">
          <button class="btn btn-light" onclick="aplicarCambios()">Aplicar</button>
        </div>

      </div>
    </div>

    <!-- CANVAS -->
    <div class="glass-card p-3 text-center">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="glass-footer text-center py-3 mt-4">
    <span>Desarrollado por <strong>Jesus Roberto Hernandez Benitez</strong></span>
  </footer>

  <script src="./assets/js/main.js"></script>

</body>
</html>
